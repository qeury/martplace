<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Martplace</title>

  <link rel="stylesheet" href="css/libs.min.css">
  <link rel="stylesheet" href="css/style.min.css">
</head>

<body>
  <header class="header">
    <div class="header__top">
      <div class="container">
        <div class="header__inner-top">

          <a href="#" class="header__logo">
            <img src="images/logo.png" alt="png">
          </a>

          <div class="header__box">
            <a class="header__btn button"  href="#" >Become a Seller</a>
            <div class="header__icon">
              <a class="header__alarm icon" href="#">&#xe858;</a>
              <span class="header__num">25</span>
              <a class="header__envelope icon" href="#">&#xe818;</a>
              <span class="header__num header__num--env">6</span>
              <a class="header__cart icon" href="#">&#xe82e;</a>
              <span class="header__num header__num--cart">2</span>
            </div>
          </div>

          <div class="header__text">
            <div class="header__photo">
              <a class="header__link" href="#"><img class="header__img" src="images/name.jpg" alt=""></a>
            </div>

            <div class="header__wrap">
              <div class="header__name">
                Taofiq Hakim
              </div>
              <div class="header__price">
                $20.45
              </div>
            </div>

          </div>

        </div>
      </div>
    </div>

    <div class="header__menu">
      <div class="container">
        <div class="header__inner-bot">
          <nav class="menu">
            <ul class="menu__list">
              <li class="menu__item"><a href="#" class="menu__link">
                  Home
                </a>
              </li>
              <li class="menu__item"><a href="#" class="menu__link">
                  All products
                </a>
              </li>
              <li class="menu__item"><a href="#" class="menu__link">
                  Wordpress
                </a>
              </li>
              <li class="menu__item"><a href="#" class="menu__link">
                  Festures
                </a>
              </li>
              <li class="menu__item"><a href="#" class="menu__link">
                  Pages
                </a>
              </li>
            </ul>
          </nav>

          <form class="form">
            <label>
              <input class="form__search" type="search" name="search" value="Search product here..."></input>
              <button class="form__btn icon button">&#xe86f;</button>
            </label>
          </form>

        </div>
      </div>
    </div>
  </header>


  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <srcrpt src="js/libs.min.js"></srcrpt>
  <srcrpt src="js/main.min.js"></srcrpt>
</body>

</html>
